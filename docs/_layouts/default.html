<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --ocean-deep: #0a4d68;
      --ocean-mid: #088395;
      --ocean-light: #05bfdb;
      --ocean-foam: #00ffca;
      --ocean-bg: #f0f9ff;
      --ocean-card: #e0f4fc;
      --ocean-text: #1a3a4a;
    }
    body { background-color: #ffffff; color: var(--ocean-text); min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; }
    .navbar { background: linear-gradient(135deg, var(--ocean-deep) 0%, var(--ocean-mid) 100%) !important; }
    .navbar-brand { color: #fff !important; font-weight: 700; }
    .navbar-brand:hover { color: var(--ocean-foam) !important; }
    .nav-link { color: rgba(255,255,255,0.9) !important; }
    .nav-link:hover { color: var(--ocean-foam) !important; }
    .card { background-color: var(--ocean-card); border: 1px solid var(--ocean-light); color: var(--ocean-text); }
    .card a { color: var(--ocean-mid); text-decoration: none; font-weight: 500; }
    .card a:hover { color: var(--ocean-deep); text-decoration: underline; }
    .text-secondary { color: var(--ocean-mid) !important; }
    hr.border-ocean { border: 0; border-top: 1px solid var(--ocean-light); opacity: 0.7; }
    footer { background-color: var(--ocean-bg); border-top: 1px solid var(--ocean-light); color: var(--ocean-mid); }
    footer a { color: var(--ocean-mid); }
    footer a:hover { color: var(--ocean-deep); }
    /* Page content: sans-serif, readable size */
    body, .content { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 1.05rem; line-height: 1.6; }
    .content h1, .content h2, .content h3 { font-family: inherit; }
    /* Code snippets */
    .content pre, .content .highlight pre { font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace; font-size: 0.9rem; background: #f0f4f8; padding: 1rem 1.25rem; border-radius: 8px; overflow-x: auto; border: 1px solid #cbd5e0; margin: 0.75rem 0; }
    .content code { font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace; font-size: 0.9em; background: #f0f4f8; padding: 0.2em 0.4em; border-radius: 4px; border: 1px solid #e2e8f0; }
    .content pre code { background: none; padding: 0; border: none; }
    /* Media block: clear separation after list items */
    .content .lab-media { margin-top: 0.5rem; margin-bottom: 1.25rem; display: block; }
    .content .lab-media img { display: block; margin-top: 0.25rem; }
    .content .lab-media video { display: block; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark border-bottom border-0 shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="{{ '/' | relative_url }}">{{ site.author_name | default: site.title }}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="nav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#ece-4160">ECE 4160</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    {{ content }}
  </main>

  <footer class="py-4 text-center small">
    <a href="https://github.com/{{ site.github.repository_nwo | default: 'github' }}" class="me-2" aria-label="GitHub">{% include icon-github.html %}</a>
    <span>Powered by Bootstrap &amp; Jekyll</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
