<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --accent: #dc3545; }
    .navbar-brand, .brand-accent { color: var(--accent) !important; font-weight: 700; }
    body { background-color: #1a1a1a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; }
    .card { background-color: #2d2d2d; border: 1px solid #404040; color: #e0e0e0; }
    .card a { color: #66bfff; text-decoration: none; }
    .card a:hover { text-decoration: underline; }
    footer { background-color: #1a1a1a; border-top: 1px solid #333; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand" href="{{ '/' | relative_url }}">{{ site.author_name | default: site.title }}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="nav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#ece-4160">ECE 4160</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    {{ content }}
  </main>

  <footer class="py-4 text-center text-secondary small">
    <a href="https://github.com/{{ site.github.repository_nwo | default: 'github' }}" class="text-secondary me-2" aria-label="GitHub">{% include icon-github.html %}</a>
    <span>Powered by Bootstrap &amp; Jekyll</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
